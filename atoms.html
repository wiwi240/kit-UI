<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Atomes | Finance Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.2/lux/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-pVn2Hl6+s0wSB8QeL+4BEFkGkR1ZiIZSvzWqmP4cwSEonjLJhTVlK3ioD4jh9XK5Q7+qeSj9txv1v1Rka0U6Ag=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="py-4 text-center">
        <a href="index.html" class="text-decoration-none text-dark">
            <h5>&larr; Retour</h5>
        </a>
    </header>
    <main class="container py-5">
        <h1>01. Atomes</h1>

        <section class="mb-5">
            <h4>Palette de couleurs</h4>
            <div class="d-flex flex-wrap gap-3 mt-3">
                <div class="swatch" style="background: var(--clr-navy);">Navy</div>
                <div class="swatch" style="background: var(--clr-gold);">Gold</div>
                <div class="swatch" style="background: var(--clr-slate);">Slate</div>
                <div class="swatch" style="background: var(--clr-emerald);">Emerald</div>
                <div class="swatch" style="background: var(--clr-rose);">Rose</div>
                <div class="swatch" style="background: var(--clr-indigo);">Indigo</div>
                <div class="swatch" style="background: var(--clr-ghost); color: #333;">Ghost</div>
            </div>
        </section>

        <section class="mb-5">
            <h4>Boutons</h4>
            <div class="d-flex flex-wrap gap-3 mt-3 p-4 bg-white rounded-4 shadow-sm">
                <button class="btn-ui8 btn-1-solid">Solid</button>
                <button class="btn-ui8 btn-2-outline">Outline</button>
                <button class="btn-ui8 btn-3-premium">Premium</button>
                <button class="btn-ui8 btn-4-glass">Glass</button>
                <button class="btn-ui8 btn-5-pill">Pill</button>
                <button class="btn-ui8 btn-6-ghost">Ghost</button>
                <button class="btn-ui8 btn-7-soft">Soft</button>
            </div>
        </section>

        <section class="mb-5">
            <h4>Inputs</h4>
            <div class="d-flex flex-column gap-3">
                <input class="form-control input-standard" placeholder="Standard">
                <input class="form-control input-underlined" placeholder="Underlined">
                <div class="form-floating">
                    <input type="email" class="form-control input-floating" id="floatingInput"
                        placeholder="name@example.com">
                    <label for="floatingInput">Floating Label</label>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control input-icon" placeholder="Icon integrated">
                </div>
                <div class="input-group">
                    <input type="search" class="form-control input-search" placeholder="Search...">
                    <button class="btn btn-outline-secondary">Go</button>
                </div>
                <input class="form-control input-standard input-error is-invalid" placeholder="Error state">
                <input class="form-control bg-dark text-white" placeholder="Dark mode">
            </div>
        </section>

        <section class="mb-5">
            <h4>Badges &amp; status</h4>
            <div class="d-flex flex-wrap gap-2 mt-3">
                <span class="badge badge-ui8 bg-navy">Navy</span>
                <span class="badge badge-ui8 bg-gold">Gold</span>
                <span class="badge badge-ui8 bg-emerald">Emerald</span>
                <span class="badge badge-ui8 bg-rose">Rose</span>
                <span class="badge badge-ui8 bg-indigo">Indigo</span>
                <span class="badge badge-status bg-success">Success</span>
                <span class="badge badge-status bg-danger">Error</span>
                <span class="badge badge-status bg-warning text-dark">Warning</span>
            </div>
        </section>
    </main>
</body>

</html>
