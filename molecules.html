<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Molécules | Finance Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.2/lux/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-pVn2Hl6+s0wSB8QeL+4BEFkGkR1ZiIZSvzWqmP4cwSEonjLJhTVlK3ioD4jh9XK5Q7+qeSj9txv1v1Rka0U6Ag=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="py-4 text-center">
        <a href="index.html" class="text-decoration-none text-dark">
            <h5>&larr; Retour</h5>
        </a>
    </header>
    <main class="container py-5">
        <h1>02. Molécules</h1>

        <section class="mb-5">
            <h3>Cartes</h3>
            <div class="row g-4">
                <div class="col-md-3">
                    <!-- verticale -->
                    <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
                        <img src="https://via.placeholder.com/300x180" class="card-img-top" alt="">
                        <div class="p-3">
                            <h6>Trading</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <!-- horizontale -->
                    <div class="card border-0 shadow-sm p-3 d-flex flex-row align-items-center rounded-4">
                        <div class="bg-secondary rounded-circle me-3" style="width:50px; height:50px;"></div>
                        <div>
                            <h6 class="mb-0">Sarah L.</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <!-- statistique -->
                    <div class="card border-0 shadow-sm p-3 text-center rounded-4 border-top border-success border-4">
                        <h6>ROI</h6>
                        <h3 class="text-success">+24%</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <!-- glass overlay -->
                    <div class="card border-0 rounded-4 overflow-hidden text-white"
                        style="background: url('https://via.placeholder.com/300x150'); height:150px;">
                        <div class="card-img-overlay glass-effect m-2 rounded-3">Premium</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <!-- pricing -->
                    <div class="card border-0 bg-primary text-white p-4 rounded-4">
                        <h6>Pro Plan</h6>
                        <h2>$99</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <!-- feature -->
                    <div class="card border-0 shadow-sm p-3 rounded-4 text-center">
                        <i class="fas fa-shield-alt text-secondary mb-2"></i>
                        <p class="small">Secure Vault</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <!-- asset ticker -->
                    <div class="p-3 bg-white border-bottom d-flex justify-content-between rounded-4 shadow-sm">
                        <span>BTC/USD</span>
                        <span class="text-success">Live</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="mb-5">
            <h3>Alertes &amp; Toasts</h3>
            <div class="d-flex flex-column gap-3">
                <div class="alert alert-ui8 alert-primary" role="alert">
                    Message information.
                </div>
                <div class="alert alert-ui8 alert-success" role="alert">
                    Succès ! opération terminée.
                </div>
                <div class="alert alert-ui8 alert-danger" role="alert">
                    Erreur critique.
                </div>
            </div>
            <!-- toasts example -->
            <div class="toast-container position-relative p-3" style="z-index: 11;">
                <div class="toast toast-ui8 show" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="toast-header">
                        <strong class="me-auto">Notification</strong>
                        <small>11 sec ago</small>
                        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                    <div class="toast-body">
                        Contenu de l'alerte toast.
                    </div>
                </div>
            </div>
        </section>

        <section class="mb-5">
            <h3>Évaluations</h3>
            <div class="d-flex align-items-center gap-1">
                <i class="fas fa-star text-warning"></i>
                <i class="fas fa-star text-warning"></i>
                <i class="fas fa-star text-warning"></i>
                <i class="fas fa-star-half-alt text-warning"></i>
                <i class="far fa-star text-warning"></i>
                <span class="ms-2">3.5 / 5</span>
            </div>
        </section>
    </main>
</body>

</html>
